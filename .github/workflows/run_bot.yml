name: Content Bot - Auto Post

on:
  schedule:
    # Runs at 6 AM, 12 PM, 6 PM, 12 AM UTC (4x daily = free tier friendly)
    - cron: '0 6,12,18,0 * * *'

  # Also allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest  # FREE on GitHub Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run content bot
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:        ${{ secrets.INSTAGRAM_USER_ID }}
          YOUTUBE_CLIENT_ID:        ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:    ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python main.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_number }}
          path: output/run_log.json
          retention-days: 7
